name: CI Autofix

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches-ignore:
      - main

jobs:
  autofix:
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      id-token: write
    uses: aramiworks/.github/.github/workflows/ci-autofix.yml@main
    secrets: inherit
